  pypi-publish:
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/AltAPI
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*|sdist
          merge-multiple: true

      - name: Remove invalid Linux wheels  # ← ДОБАВИТЬ ЭТО
        run: |
          # Удалить wheels без manylinux в названии
          rm -f dist/*-linux_*.whl
          # Проверить что осталось
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          attestations: true
